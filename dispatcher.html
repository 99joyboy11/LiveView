<!DOCTYPE html>
<html>
<head>
  <title>Dispatcher Live Camera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align:center; margin:0; padding:20px; }
    video { width:100%; max-width:600px; border:1px solid #ccc; margin-top:10px; }
  </style>
</head>
<body>

<h2>Dispatcher Live Camera</h2>
<p>Waiting for caller...</p>
<video id="dispatcherVideo" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/simple-peer@9/simplepeer.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"></script>

<script>
const video = document.getElementById("dispatcherVideo");

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCxgJrDBr0PNvOG6rd-N1ox6-Tw3-dgE7U",
  authDomain: "liveview-68758.firebaseapp.com",
  projectId: "liveview-68758",
  storageBucket: "liveview-68758.firebasestorage.app",
  messagingSenderId: "1022135977860",
  appId: "1:1022135977860:web:68cf35fba5acd02020ffd1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const callDoc = db.collection("calls").doc("demo-call");

// SimplePeer receiver
const peer = new SimplePeer({ initiator:false, trickle:false });

peer.on('signal', async data => {
  await callDoc.set({ answer: data }, { merge:true });
  console.log("Answer sent to caller");
});

peer.on('stream', stream => {
  video.srcObject = stream;
  console.log("Live stream received!");
});

// Listen for call request
callDoc.onSnapshot(snapshot => {
  const data = snapshot.data();
  if (data?.status === "calling" && data.offer) {
    console.log("Call received, sending answer...");
    peer.signal(data.offer);
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dispatcher Live View</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
body{text-align:center;font-family:Arial}
video{width:100%;max-width:700px;border:1px solid #ccc;margin-top:20px;}
</style>
</head>
<body>

<h2>Dispatcher Live Video</h2>
<video id="video" autoplay playsinline></video>

<script>
const peer = new Peer('dispatcher', {
    host: '0.peerjs.com',
    port: 443,
    path: '/',
    secure: true
}); // fixed ID for caller to call

peer.on('open', id => console.log("Dispatcher ready, Peer ID:", id));

peer.on('call', call => {
    call.answer(); // no local stream needed
    call.on('stream', remoteStream => {
        document.getElementById("video").srcObject = remoteStream;
        console.log("Receiving caller video stream");
    });
});
</script>

</body>
</html>

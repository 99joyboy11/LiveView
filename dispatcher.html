<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dispatcher Live Camera</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import SimplePeer from "https://cdn.jsdelivr.net/npm/simple-peer@9/simplepeer.min.js";

// --- Your Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyCxgJrDBr0PNvOG6rd-N1ox6-Tw3-dgE7U",
  authDomain: "liveview-68758.firebaseapp.com",
  projectId: "liveview-68758",
  storageBucket: "liveview-68758.firebasestorage.app",
  messagingSenderId: "1022135977860",
  appId: "1:1022135977860:web:68cf35fba5acd02020ffd1"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Create video element
const video = document.createElement("video");
video.autoplay = true;
video.playsInline = true;
video.style.width = "80%";
document.body.appendChild(video);

// Firestore doc for signaling
const callDoc = doc(db, "calls", "demo-call");

// Create WebRTC peer (dispatcher = receiver)
const peer = new SimplePeer({ initiator: false, trickle: false });

peer.on('signal', async data => {
  await setDoc(callDoc, { answer: data }, { merge: true });
});

peer.on('stream', stream => {
  video.srcObject = stream;
});

onSnapshot(callDoc, snapshot => {
  const data = snapshot.data();
  if (data?.offer) {
    peer.signal(data.offer);
  }
});
</script>
</head>
<body>
<h2>Dispatcher Live Camera</h2>
</body>
</html>

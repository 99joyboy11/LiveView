<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dispatcher View</title>
<style>
body { font-family: sans-serif; text-align: center; }
video { margin: 10px; border: 1px solid #ccc; width: 300px; }
</style>
<script type="module">
import { Room } from 'https://unpkg.com/livekit-client/dist/livekit-client.mjs';

const wsUrl = "wss://liveview-qb2kk5yg.livekit.cloud";

// Use same token server if dispatcher also needs a token
async function getToken() {
  const res = await fetch('https://YOUR_TOKEN_SERVER_URL/getToken');
  const data = await res.json();
  return data.token;
}

async function init() {
  const token = await getToken();
  const room = new Room();
  await room.connect(wsUrl, token);

  const videosDiv = document.createElement('div');
  document.body.appendChild(videosDiv);

  room.on('trackSubscribed', track => {
    const videoEl = document.createElement('video');
    videoEl.autoplay = true;
    videoEl.playsInline = true;
    track.attach(videoEl);
    videosDiv.appendChild(videoEl);
  });

  room.on('participantConnected', p => console.log('Connected:', p.identity));
  room.on('participantDisconnected', p => console.log('Disconnected:', p.identity));
}

init();
</script>
</head>
<body>
<h2>Dispatcher View</h2>
<p>Waiting for caller video...</p>
</body>
</html>

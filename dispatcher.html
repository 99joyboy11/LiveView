<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dispatcher Viewer</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
<h2>Dispatcher Live Camera</h2>
<video id="remoteVideo" autoplay playsinline style="width:80%; border:1px solid #ccc;"></video>

<script>
const video = document.getElementById("remoteVideo");

// Connect to PeerJS public server
const peer = new Peer(); // auto-generated ID

// Call the caller
const call = peer.call('caller1', null);

call.on('stream', stream => {
  video.srcObject = stream;
});

call.on('error', err => {
  console.error("Call error:", err);
});
</script>
</body>
</html>

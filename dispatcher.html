<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dispatcher View</title>
</head>
<body>
  <h2>Live from Caller</h2>
  <video id="remoteVideo" autoplay playsinline style="width:100%;max-width:500px;"></video>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const SIGNALING_SERVER = "https://f6131d7f-1de0-47bb-b7d7-821af2af411d-00-o2b1b2rl0arz.worf.replit.dev:8080";
    const ROOM = "live-room";

    const socket = io(SIGNALING_SERVER);
    let pc;
    const remoteVideo = document.getElementById("remoteVideo");

    socket.on("offer", async data => {
      pc = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
      });

      pc.ontrack = event => {
        remoteVideo.srcObject = event.streams[0];
      };

      pc.onicecandidate = event => {
        if (event.candidate) {
          socket.emit("ice-candidate", { to: data.from, candidate: event.candidate });
        }
      };

      await pc.setRemoteDescription(data.offer);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      socket.emit("answer", { to: data.from, answer: pc.localDescription });
    });

    socket.on("ice-candidate", async data => {
      try {
        await pc.addIceCandidate(data.candidate);
      } catch (e) { console.error(e); }
    });

    socket.emit("join", ROOM);
  </script>
</body>
</html>

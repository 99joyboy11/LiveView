const startBtn = document.createElement('button');
startBtn.textContent = 'Start Camera';
document.body.appendChild(startBtn);

const localVideo = document.createElement('video');
localVideo.autoplay = true;
localVideo.muted = true;
localVideo.playsInline = true;
localVideo.width = 400;
document.body.appendChild(localVideo);

startBtn.addEventListener('click', async () => {
  const room = new Room();
  await room.connect(wsUrl, token);

  const track = await LocalVideoTrack.create({ resolution: VideoPresets.h720 });
  room.localParticipant.publishTrack(track);

  localVideo.srcObject = track.mediaStreamTrack ? new MediaStream([track.mediaStreamTrack]) : null;

  alert("Camera started and streaming!");
});
</script>

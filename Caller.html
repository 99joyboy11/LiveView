<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMS Caller Camera</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
body{text-align:center;font-family:Arial}
video{width:100%;max-width:500px;border:1px solid #ccc;margin-top:20px;}
</style>
</head>
<body>

<h2>Caller Camera</h2>
<video id="video" autoplay playsinline></video>

<script>
async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false
        });

        document.getElementById("video").srcObject = stream;

        // Use PeerJS public cloud server (no account needed)
        const peer = new Peer(undefined, {
            host: '0.peerjs.com',
            port: 443,
            path: '/',
            secure: true
        });

        peer.on('open', id => {
            console.log("Caller Peer ID:", id);
            // Call the dispatcher with fixed ID
            const call = peer.call('dispatcher', stream);
        });

    } catch (err) {
        alert("Camera access denied or not supported.");
        console.error(err);
    }
}

// Start camera automatically
startCamera();
</script>

</body>
</html>

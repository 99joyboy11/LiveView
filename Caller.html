<!DOCTYPE html>
<html>
<head>
  <title>Mobile Caller Live Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align:center; margin:0; padding:20px; }
    video { width:100%; max-width:500px; border:1px solid #ccc; margin-top:10px; }
    button { padding:10px 20px; font-size:16px; margin-top:20px; }
  </style>
</head>
<body>

<h2>Mobile Caller Camera</h2>
<video id="video" autoplay playsinline></video>
<br>
<button id="startBtn">Start Live Stream</button>

<script>
const startBtn = document.getElementById("startBtn");
const video = document.getElementById("video");

startBtn.addEventListener("click", async () => {
  startBtn.disabled = true; // prevent multiple taps

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" },
      audio: false
    });

    // Set the stream
    video.srcObject = stream;

    // Some mobile browsers require explicit play()
    await video.play();

    console.log("Camera opened successfully!");
  } catch (err) {
    alert("Camera error: " + err.message);
    console.error(err);
  }
});
</script>

</body>
</html>

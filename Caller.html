<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caller Camera</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    display: flex; justify-content: center; align-items: center;
    background: #222; color: #fff; font-family: sans-serif;
    user-select: none;
  }
  #overlay {
    position: absolute; top:0; left:0; width:100%; height:100%;
    display:flex; justify-content:center; align-items:center;
    font-size: 1.5em; cursor: pointer;
    background: rgba(0,0,0,0.6);
  }
  video { width: 100%; height: auto; }
</style>
</head>
<body>

<div id="overlay">Tap anywhere to start camera</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import SimplePeer from "https://cdn.jsdelivr.net/npm/simple-peer@9/simplepeer.min.js";

// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyCxgJrDBr0PNvOG6rd-N1ox6-Tw3-dgE7U",
  authDomain: "liveview-68758.firebaseapp.com",
  projectId: "liveview-68758",
  storageBucket: "liveview-68758.firebasestorage.app",
  messagingSenderId: "1022135977860",
  appId: "1:1022135977860:web:68cf35fba5acd02020ffd1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const overlay = document.getElementById("overlay");

overlay.addEventListener("click", async () => {
  overlay.style.display = "none";

  const video = document.createElement("video");
  video.autoplay = true;
  video.playsInline = true;
  document.body.appendChild(video);

  // Open camera
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
  } catch(err) {
    alert("Camera access denied or not supported");
    console.error(err);
    return;
  }
  video.srcObject = stream;

  const callDoc = doc(db, "calls", "demo-call");

  // WebRTC peer
  const peer = new SimplePeer({ initiator: true, trickle: false, stream });

  peer.on('signal', async data => {
    await setDoc(callDoc, { offer: data });
  });

  onSnapshot(callDoc, snapshot => {
    const data = snapshot.data();
    if (data?.answer) peer.signal(data.answer);
  });
});
</script>

</body>
</html>

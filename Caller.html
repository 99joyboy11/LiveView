<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Caller Camera</title>
</head>
<body>
  <h2>Caller Camera Streaming</h2>
  <video id="localVideo" autoplay muted playsinline style="width:100%;max-width:400px;"></video>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const SIGNALING_SERVER = "https://your-replit-url";
    const ROOM = "live-room";

    const socket = io(SIGNALING_SERVER);
    let pc;
    const localVideo = document.getElementById("localVideo");

    socket.emit("join", ROOM);

    async function start() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      localVideo.srcObject = stream;

      pc = new RTCPeerConnection({
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          {
            urls: "turn:turn.anyfirewall.com:443?transport=tcp",
            username: "webrtc",
            credential: "webrtc"
          }
        ]
      });

      stream.getTracks().forEach(track => pc.addTrack(track, stream));

      pc.onicecandidate = event => {
        if (event.candidate) socket.emit("ice-candidate", { room: ROOM, candidate: event.candidate });
      };

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit("offer", { room: ROOM, offer: pc.localDescription });
    }

    socket.on("answer", async data => {
      await pc.setRemoteDescription(data.answer);
    });

    socket.on("ice-candidate", async data => {
      try { await pc.addIceCandidate(data.candidate); } catch(e){ console.error(e); }
    });

    start();
  </script>
</body>
</html>

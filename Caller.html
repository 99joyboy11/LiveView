<!DOCTYPE html>

<style>

video { margin-top: 20px; border: 1px solid #ccc; width: 300px; }
button { padding: 10px 20px; font-size: 16px; margin-top: 20px; }
</style>
<script type="module">
import { Room, LocalVideoTrack } from 'https://unpkg.com/livekit-client/dist/livekit-client.mjs';

// LiveKit WebSocket URL
const wsUrl = "wss://liveview-qb2kk5yg.livekit.cloud";

// Use your valid token
const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3ODMzNzgxMTEsImlkZW50aXR5IjoibWljcm9iaXpvbmUiLCJpc3MiOiJBUElnZGdEbTRNVlBheEUiLCJuYmYiOjE3NzMzNzgxMTIsInN1YiI6Im1pY3JvYml6b25lIiwidmlkZW8iOnsiY2FuUHVibGlzaCI6dHJ1ZSwiY2FuUHVibGlzaERhdGEiOnRydWUsImNhblN1YnNjcmliZSI6dHJ1ZSwicm9vbSI6ImxpdmVmZWVkIiwicm9vbUpvaW4iOnRydWV9fQ.qVjp4hRWcmo5VVdCfP1-Y2bHWY27meQV08N2jwCgjPY";

document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    const localVideo = document.getElementById('localVideo');
    localVideo.srcObject = stream;

    const room = new Room();
    await room.connect(wsUrl, token);

    const track = new LocalVideoTrack(stream.getVideoTracks()[0]);
    await room.localParticipant.publishTrack(track);

    alert("Streaming now!");
  } catch (err) {
    console.error(err);
    alert("Camera access failed. Make sure permissions are allowed.");
  }
});
</script>
</head>
<body>
<h2>Caller Camera</h2>
<p>Tap the button below to start streaming:</p>
<button id="startBtn">Start Camera</button>
<video id="localVideo" autoplay muted playsinline></video>
</body>
</html>

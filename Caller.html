<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camera Test</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; }
  video { width: 100%; height: auto; }
</style>
</head>
<body>
<video autoplay playsinline></video>

<script>
const video = document.querySelector("video");

async function openCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    video.srcObject = stream;
  } catch (err) {
    alert("Camera access denied or not supported on this device.");
    console.error(err);
  }
}

// Run on load
window.addEventListener("load", () => {
  // On mobile, you usually need a click to allow camera
  if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
    alert("Tap anywhere to start camera"); // tells user
    document.body.addEventListener("click", openCamera, { once: true });
  } else {
    // Desktop: can auto-start
    openCamera();
  }
});
</script>
</body>
</html>

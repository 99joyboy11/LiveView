<!DOCTYPE html>
<html>
<head>
  <title>Mobile Caller Live Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align:center; margin:0; padding:20px; }
    video { width:100%; max-width:500px; border:1px solid #ccc; margin-top:10px; }
  </style>
</head>
<body>

<h2>Mobile Caller Camera</h2>
<p>Tap to start streaming</p>
<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/simple-peer@9/simplepeer.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"></script>

<script>
const video = document.getElementById("video");

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCxgJrDBr0PNvOG6rd-N1ox6-Tw3-dgE7U",
  authDomain: "liveview-68758.firebaseapp.com",
  projectId: "liveview-68758",
  storageBucket: "liveview-68758.firebasestorage.app",
  messagingSenderId: "1022135977860",
  appId: "1:1022135977860:web:68cf35fba5acd02020ffd1"
};
const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const callDoc = db.collection("calls").doc("demo-call");

document.body.addEventListener("click", async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:"environment"}, audio:false });
    video.srcObject = stream;

    const peer = new SimplePeer({
      initiator: true,
      trickle: false,
      stream,
      config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] }
    });

    peer.on('signal', async data => {
      await callDoc.set({ offer: data });
    });

    callDoc.onSnapshot(snapshot => {
      const data = snapshot.data();
      if (data?.answer) peer.signal(data.answer);
    });

    console.log("Camera + streaming started!");
  } catch(e) {
    alert("Camera error: " + e);
  }
}, { once: true });
</script>
</body>
</html>

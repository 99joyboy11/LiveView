<!DOCTYPE html>
<html>
<head>
  <title>Caller Camera Live Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align: center; margin:0; padding:20px; }
    video { width:100%; max-width:500px; border:1px solid #ccc; margin-top:10px; }
  </style>
</head>
<body>

<h2>Mobile Caller Camera</h2>
<p>Allow camera access to start streaming</p>
<video id="video" autoplay playsinline></video>

<script>
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" },
      audio: false
    });
    document.getElementById("video").srcObject = stream;

    // Optionally store the stream for future WebRTC/streaming code
    window.localStream = stream;

    console.log("Camera started successfully!");
  } catch(err) {
    alert("Camera access denied or not supported.");
    console.error(err);
  }
}

// Start camera automatically
startCamera();
</script>

</body>
</html>

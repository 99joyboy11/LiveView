<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Caller Camera Mobile-Friendly</title>
<style>
body { font-family: sans-serif; text-align: center; }
video { margin-top: 20px; border: 1px solid #ccc; width: 300px; }
button { padding: 10px 20px; font-size: 16px; margin-top: 20px; }
</style>
<script type="module">
import { Room, LocalVideoTrack } from 'https://unpkg.com/livekit-client/dist/livekit-client.mjs';

const wsUrl = "wss://liveview-qb2kk5yg.livekit.cloud";

// Function to fetch a fresh token from your server
async function getToken() {
  const res = await fetch('https://YOUR_TOKEN_SERVER_URL/getToken'); // replace with real URL
  const data = await res.json();
  return data.token;
}

document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    // Step 1: Camera access
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    document.getElementById('localVideo').srcObject = stream;

    // Step 2: Connect to LiveKit
    const token = await getToken(); // fresh token
    const room = new Room();
    await room.connect(wsUrl, token);

    // Step 3: Publish track
    const track = new LocalVideoTrack(stream.getVideoTracks()[0]);
    await room.localParticipant.publishTrack(track);

    alert("Streaming now!");
  } catch (err) {
    console.error(err);
    alert("Camera access failed. Check permissions or token server.");
  }
});
</script>
</head>
<body>
<h2>Caller Camera</h2>
<p>Tap the button below to start streaming your camera:</p>
<button id="startBtn">Start Camera</button>
<video id="localVideo" autoplay muted playsinline></video>
</body>
</html>
